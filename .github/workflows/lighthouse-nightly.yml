name: lighthouse-nightly

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install root dependencies & generate contract
        working-directory: ${{ github.workspace }}
        run: |
          npm ci
          npm run generate

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Start mock API
        run: npm run mock &

      - name: Start preview
        run: npm run preview &

      - name: Wait for servers
        run: npx wait-on tcp:127.0.0.1:4010 http://127.0.0.1:4173

      - name: Run Lighthouse CI
        run: npx lhci autorun

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: frontend/lhci-reports/
